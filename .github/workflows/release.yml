name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on:
      - self-hosted
      - Linux
      - X64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Build release
        run: RUSTC_WRAPPER=sccache cargo build --release

      - name: Create checksums
        run: |
          sha256sum target/release/kg target/release/kg-mcp target/release/kg-tui > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            Release ${{ github.ref_name }}
          files: |
            target/release/kg
            target/release/kg-mcp
            target/release/kg-tui
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
